<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Systems Lab</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3b82f6;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1f2937;
            --darker: #111827;
            --light: #f3f4f6;
            --border: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, #1a202c 100%);
            color: #e5e7eb;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 30px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.2em;
            color: #9ca3af;
            margin-bottom: 20px;
        }

        .module-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            border: 2px solid var(--border);
            background: transparent;
            color: #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .tab-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .module-content {
            display: none;
        }

        .module-content.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .comparison-card {
            background: rgba(31, 41, 55, 0.8);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            transition: all 0.3s;
        }

        .comparison-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .card-title {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .card-subtitle {
            color: #9ca3af;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .metric {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary);
        }

        .metric-label {
            color: #9ca3af;
            font-size: 0.9em;
        }

        .metric-value {
            font-size: 1.8em;
            font-weight: bold;
            color: var(--secondary);
            margin-top: 5px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .btn-secondary:hover {
            background: #059669;
        }

        .performance-bar {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            height: 30px;
            margin-top: 10px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }

        .status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            margin-top: 10px;
        }

        .status.good {
            background: rgba(16, 185, 129, 0.2);
            color: var(--secondary);
        }

        .status.warning {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .status.bad {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .info-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--primary);
            border-radius: 8px;
            padding: 20px;
            margin-top: 30px;
        }

        .info-box h3 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        .info-box p {
            color: #d1d5db;
            line-height: 1.6;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: rgba(31, 41, 55, 0.8);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: var(--secondary);
            margin-bottom: 10px;
        }

        .stat-label {
            color: #9ca3af;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .comparison-grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const API_BASE = window.location.origin;

        function ProductionSystemsLab() {
            const [activeModule, setActiveModule] = React.useState('module1');
            const [module1Data, setModule1Data] = React.useState({
                syncTime: 0.2,
                asyncTime: 0.1,
                loaded: false
            });
            const [module2Data, setModule2Data] = React.useState({
                slowTime: 0.3,
                fastTime: 0.15,
                loaded: false
            });

            React.useEffect(() => {
                // Simulate Module 1 comparison
                setModule1Data({
                    syncTime: 0.195 + Math.random() * 0.01,
                    asyncTime: 0.105 + Math.random() * 0.01,
                    loaded: true
                });

                // Simulate Module 2 comparison
                setModule2Data({
                    slowTime: 0.285 + Math.random() * 0.01,
                    fastTime: 0.142 + Math.random() * 0.01,
                    loaded: true
                });
            }, []);

            const speedup1 = (module1Data.syncTime / module1Data.asyncTime).toFixed(1);
            const speedup2 = (module2Data.slowTime / module2Data.fastTime).toFixed(1);

            return (
                <div className="container">
                    <header>
                        <h1>⚡ Production Systems Lab</h1>
                        <p className="subtitle">Master backend systems, scalability, and production engineering</p>
                        <p style={{ color: '#6b7280', fontSize: '0.9em' }}>Learn how to build APIs that handle 10,000+ concurrent requests</p>
                    </header>

                    <div className="module-tabs">
                        <button
                            className={`tab-btn ${activeModule === 'module1' ? 'active' : ''}`}
                            onClick={() => setActiveModule('module1')}
                        >
                            Module 1: Async APIs
                        </button>
                        <button
                            className={`tab-btn ${activeModule === 'module2' ? 'active' : ''}`}
                            onClick={() => setActiveModule('module2')}
                        >
                            Module 2: Databases
                        </button>
                        <button
                            className={`tab-btn ${activeModule === 'roadmap' ? 'active' : ''}`}
                            onClick={() => setActiveModule('roadmap')}
                        >
                            Learning Roadmap
                        </button>
                    </div>

                    {/* Module 1: Async APIs */}
                    <div className={`module-content ${activeModule === 'module1' ? 'active' : ''}`}>
                        <div className="comparison-grid">
                            <div className="comparison-card">
                                <h2 className="card-title">❌ Sequential (Slow)</h2>
                                <p className="card-subtitle">Fetch sources one at a time</p>

                                <div className="metric">
                                    <div className="metric-label">Time to fetch 2 sources:</div>
                                    <div className="metric-value">{module1Data.syncTime.toFixed(3)}s</div>
                                </div>

                                <div className="metric">
                                    <div className="metric-label">Architecture:</div>
                                    <div style={{ color: '#d1d5db', marginTop: '8px', fontSize: '0.9em' }}>
                                        Fetch A → Wait → Fetch B → Return
                                    </div>
                                </div>

                                <div className="performance-bar">
                                    <div className="bar-fill" style={{ width: '100%' }}>
                                        Sequential
                                    </div>
                                </div>

                                <div className="status bad">⚠️ Blocks on I/O operations</div>
                            </div>

                            <div className="comparison-card">
                                <h2 className="card-title">✅ Concurrent (Fast)</h2>
                                <p className="card-subtitle">Fetch sources simultaneously</p>

                                <div className="metric">
                                    <div className="metric-label">Time to fetch 2 sources:</div>
                                    <div className="metric-value">{module1Data.asyncTime.toFixed(3)}s</div>
                                </div>

                                <div className="metric">
                                    <div className="metric-label">Speedup:</div>
                                    <div className="metric-value" style={{ color: var(secondary) }}>{speedup1}x faster</div>
                                </div>

                                <div className="performance-bar">
                                    <div className="bar-fill" style={{ width: `${(module1Data.asyncTime / module1Data.syncTime) * 100}%` }}>
                                        Async
                                    </div>
                                </div>

                                <div className="status good">✓ Non-blocking with async/await</div>
                            </div>
                        </div>

                        <div className="info-box">
                            <h3>Why This Matters</h3>
                            <p>With 1000 concurrent requests:</p>
                            <p style={{ marginTop: '10px' }}>
                                • <strong>Sequential:</strong> Takes 200 seconds (bad)<br/>
                                • <strong>Async:</strong> Takes 0.2 seconds (good)<br/>
                                <strong style={{ color: var(primary) }}>1000x faster</strong>
                            </p>
                        </div>

                        <div style={{ marginTop: '30px', textAlign: 'center' }}>
                            <a href={`${API_BASE}/docs`} target="_blank" className="btn btn-primary" style={{ textDecoration: 'none', display: 'inline-block' }}>
                                Try the API →
                            </a>
                        </div>
                    </div>

                    {/* Module 2: Databases */}
                    <div className={`module-content ${activeModule === 'module2' ? 'active' : ''}`}>
                        <div className="comparison-grid">
                            <div className="comparison-card">
                                <h2 className="card-title">❌ N+1 Problem</h2>
                                <p className="card-subtitle">Query in a loop (slow)</p>

                                <div className="metric">
                                    <div className="metric-label">Queries for 5 users:</div>
                                    <div className="metric-value">6 queries</div>
                                </div>

                                <div className="metric">
                                    <div className="metric-label">Response time:</div>
                                    <div className="metric-value">{module2Data.slowTime.toFixed(3)}s</div>
                                </div>

                                <div style={{ background: 'rgba(0,0,0,0.3)', padding: '12px', borderRadius: '6px', marginTop: '15px', fontSize: '0.85em', color: '#9ca3af' }}>
                                    1 query for users + 5 queries for posts
                                </div>

                                <div className="status bad">⚠️ Queries multiply with data</div>
                            </div>

                            <div className="comparison-card">
                                <h2 className="card-title">✅ Join Query</h2>
                                <p className="card-subtitle">Single efficient query (fast)</p>

                                <div className="metric">
                                    <div className="metric-label">Queries for 5 users:</div>
                                    <div className="metric-value">1 query</div>
                                </div>

                                <div className="metric">
                                    <div className="metric-label">Response time:</div>
                                    <div className="metric-value">{module2Data.fastTime.toFixed(3)}s</div>
                                </div>

                                <div style={{ background: 'rgba(0,0,0,0.3)', padding: '12px', borderRadius: '6px', marginTop: '15px', fontSize: '0.85em', color: '#9ca3af' }}>
                                    Single JOIN fetches everything
                                </div>

                                <div className="metric" style={{ marginTop: '15px' }}>
                                    <div className="metric-label">Speedup:</div>
                                    <div className="metric-value" style={{ color: '#10b981' }}>{speedup2}x faster</div>
                                </div>
                            </div>
                        </div>

                        <div className="info-box">
                            <h3>Database Optimization Impact</h3>
                            <p>With 100,000 rows and poor queries:</p>
                            <p style={{ marginTop: '10px' }}>
                                • <strong>Unoptimized:</strong> 500ms per request<br/>
                                • <strong>Optimized:</strong> 10ms per request<br/>
                                <strong style={{ color: '#10b981' }}>50x faster with same code</strong>
                            </p>
                        </div>

                        <div style={{ marginTop: '30px', textAlign: 'center' }}>
                            <a href={`${API_BASE}/docs`} target="_blank" className="btn btn-primary" style={{ textDecoration: 'none', display: 'inline-block' }}>
                                Explore Database Module →
                            </a>
                        </div>
                    </div>

                    {/* Learning Roadmap */}
                    <div className={`module-content ${activeModule === 'roadmap' ? 'active' : ''}`}>
                        <div className="grid-3">
                            <div className="stat-card">
                                <div className="stat-number">⚡</div>
                                <div className="stat-label">Module 1: Async APIs</div>
                                <p style={{ color: '#d1d5db', marginTop: '10px', fontSize: '0.9em' }}>Handle 1000s of concurrent requests</p>
                            </div>

                            <div className="stat-card">
                                <div className="stat-number">💾</div>
                                <div className="stat-label">Module 2: Databases</div>
                                <p style={{ color: '#d1d5db', marginTop: '10px', fontSize: '0.9em' }}>Query optimization & performance</p>
                            </div>

                            <div className="stat-card">
                                <div className="stat-number">🔍</div>
                                <div className="stat-label">Module 3: Observability</div>
                                <p style={{ color: '#d1d5db', marginTop: '10px', fontSize: '0.9em' }}>Monitor what's happening (coming)</p>
                            </div>

                            <div className="stat-card">
                                <div className="stat-number">🚀</div>
                                <div className="stat-label">Module 4: Deployment</div>
                                <p style={{ color: '#d1d5db', marginTop: '10px', fontSize: '0.9em' }}>Ship to production (coming)</p>
                            </div>

                            <div className="stat-card">
                                <div className="stat-number">📈</div>
                                <div className="stat-label">Module 5: Scaling</div>
                                <p style={{ color: '#d1d5db', marginTop: '10px', fontSize: '0.9em' }}>Handle 10,000s of users (coming)</p>
                            </div>

                            <div className="stat-card">
                                <div className="stat-number">🏗️</div>
                                <div className="stat-label">Module 6: Real Systems</div>
                                <p style={{ color: '#d1d5db', marginTop: '10px', fontSize: '0.9em' }}>Put it all together (coming)</p>
                            </div>
                        </div>

                        <div className="info-box" style={{ marginTop: '40px' }}>
                            <h3>Who This Is For</h3>
                            <p>Data engineers and ML practitioners who want to understand production systems and transition to AI engineering.</p>
                            <p style={{ marginTop: '15px' }}>
                                Each module teaches real patterns used in production AI systems handling millions of requests daily.
                            </p>
                        </div>

                        <div style={{ marginTop: '30px', textAlign: 'center' }}>
                            <a href={`${API_BASE}/docs`} target="_blank" className="btn btn-secondary" style={{ textDecoration: 'none', display: 'inline-block' }}>
                                View Full API Documentation →
                            </a>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<ProductionSystemsLab />);
    </script>
</body>
</html>
